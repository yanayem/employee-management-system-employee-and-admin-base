{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Departments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    .glass {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .transition-hover { transition: all 0.2s ease-in-out; }
  </style>
</head>
<body class="mt-16 md:ml-64 bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 min-h-screen flex">

  <!-- Sidebar -->
  {% include 'adminsidetopbar.html' %}

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-h-screen p-6">

    <h1 class="text-3xl font-bold mb-6 text-gray-900 dark:text-gray-100">Departments</h1>

    <!-- Add Department Button -->
    <div class="mb-6 flex justify-end">
      <button id="add-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition flex items-center">
        <i class="fa fa-plus mr-2"></i> Add Department
      </button>
    </div>

    <!-- Departments Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
      {% for dept in departments %}
        <div class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-md flex flex-col justify-between min-h-[160px] transition-hover hover:shadow-lg">
          <div>
            <h2 class="text-2xl font-bold text-green-600 dark:text-gray-100 mb-2">{{ dept.name }}</h2>
            <p class="text-gray-700 dark:text-gray-300 text-base leading-relaxed">{{ dept.description|default:"No Description" }}</p>
          </div>
          <div class="mt-4 flex justify-end space-x-2">
            <a href="{% url 'admin_department_detail' dept.pk %}" class="px-3 py-1 bg-green-600 hover:bg-green-700 text-white rounded transition">
              <i class="fa fa-eye"></i>
            </a>
            <a href="{% url 'admin_department_delete' dept.pk %}" class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded transition"
               onclick="return confirm('Delete {{ dept.name }}?')">
              <i class="fa fa-trash"></i>
            </a>
          </div>
        </div>
      {% empty %}
        <p class="text-gray-500 col-span-3">No departments yet.</p>
      {% endfor %}
    </div>
  </div>

  <!-- Add Department Modal -->
  <div id="add-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center">
    <div id="modalBackdrop" class="absolute inset-0 bg-black bg-opacity-40 backdrop-blur-sm"></div>

    <div class="glass relative z-10 w-full max-w-md p-6 mx-4">
      <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-gray-100">Add Department</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex justify-end gap-2 mt-4">
          <button type="button" id="close-modal" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded transition">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded transition">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Modal toggle
    const modal = document.getElementById('add-modal');
    const btn = document.getElementById('add-btn');
    const close = document.getElementById('close-modal');
    const backdrop = document.getElementById('modalBackdrop');

    btn.onclick = () => modal.classList.remove('hidden');
    close.onclick = () => modal.classList.add('hidden');
    backdrop.onclick = () => modal.classList.add('hidden');

    // Light/Dark toggle with persistence
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    if(themeToggle){
      themeToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      });
    }
  </script>
</body>
</html>
