{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if project %}Edit Project{% else %}Add Project{% endif %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
</head>

<body class="bg-gray-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300">

{% include 'adminsidetopbar.html' %}

<main class="ml-0 md:ml-64 pt-20 max-w-4xl mx-auto p-6">

    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-3xl font-black tracking-tight">
                {% if project %}Edit Project{% else %}Create New Project{% endif %}
            </h2>
            <p class="text-slate-500 font-medium">Define project scope and assignment</p>
        </div>
        <a href="{% url 'admin_project_list' %}" class="text-slate-500 hover:text-slate-900 dark:hover:text-white font-bold text-sm transition flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Back to List
        </a>
    </div>

    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-gray-100 dark:border-slate-800 shadow-xl">
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Title -->
                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Project Title</label>
                    <input type="text" name="title" required
                           value="{{ project.title|default:'' }}"
                           class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition"
                           placeholder="Enter project name">
                </div>

                <!-- Description -->
                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Description</label>
                    <textarea name="description" rows="4"
                        class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition"
                        placeholder="What needs to be done?">{{ project.description|default:'' }}</textarea>
                </div>

                <!-- Assign to -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Assign to Employee</label>
                    <select name="assigned_to" required
                        class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition">
                        <option value="">Select Employee</option>
                        {% for emp in employees %}
                            <option value="{{ emp.id }}" {% if project.assigned_to.id == emp.id %}selected{% endif %}>
                                {{ emp.full_name }} ({{ emp.employee_id }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Due Date -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Due Date</label>
                    <input type="date" name="due_date" required
                        value="{{ project.due_date|date:'Y-m-d' }}"
                        class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition">
                </div>

                <!-- Priority -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Priority Level</label>
                    <select name="priority"
                        class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition">
                        <option value="Low" {% if project.priority == "Low" %}selected{% endif %}>Low</option>
                        <option value="Medium" {% if project.priority == "Medium" %}selected{% endif %}{% if not project %}selected{% endif %}>Medium</option>
                        <option value="High" {% if project.priority == "High" %}selected{% endif %}>High</option>
                    </select>
                </div>

                <!-- Status -->
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Status</label>
                    <select name="status"
                        class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition">
                        <option value="Planning" {% if project.status == "Planning" %}selected{% endif %}>Planning</option>
                        <option value="In Progress" {% if project.status == "In Progress" %}selected{% endif %}>In Progress</option>
                        <option value="Review" {% if project.status == "Review" %}selected{% endif %}>Review</option>
                        <option value="Completed" {% if project.status == "Completed" %}selected{% endif %}>Completed</option>
                    </select>
                </div>

                <!-- Progress -->
                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 flex justify-between">
                        <span>Project Progress</span>
                        <span id="progress-val" class="text-slate-900 dark:text-white">{{ project.progress|default:0 }}%</span>
                    </label>
                    <input type="range" name="progress" min="0" max="100" step="5"
                        value="{{ project.progress|default:0 }}"
                        oninput="document.getElementById('progress-val').innerText = this.value + '%'"
                        class="w-full h-2 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-slate-900 dark:accent-white">
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center gap-4 pt-6 border-t border-gray-100 dark:border-slate-800">
                <button type="submit"
                    class="flex-1 bg-slate-900 dark:bg-white text-white dark:text-slate-950 font-black py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                    {% if project %}Update Project Details{% else %}Create Project{% endif %}
                </button>
                <a href="{% url 'admin_project_list' %}"
                   class="px-8 py-4 rounded-2xl font-bold text-slate-500 hover:bg-gray-100 dark:hover:bg-slate-800 transition">
                    Discard
                </a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
